<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <script>
    const WEB_APP_URL =
      "https://script.google.com/macros/s/AKfycby9XdKJ2U9HVLezcP38hP_SgOF-ehY5QEli4OWAPFNwQ3-ryNeiVxlIYPMbGp-1qMJT/exec";
    const dayPicker = document.getElementById("dayPicker");
    const deadlineDay = document.getElementById("deadlineDay");
    const form = document.getElementById("contactForm");
    const submitButton = document.getElementById("submitButton");

    //helper functions
    function getTodayString() {
      const now = new Date();
      const offset = now.getTimezoneOffset();

      return new Date(now.getTime() - offset * 60000).toISOString().slice(0, 10);
    }

    function subtractDays(dateString, days) {
      const date = new Date(dateString);
      date.setDate(date.getDate() - days);

      return date.toISOString().split("T")[0];
    }

    //set min date
    const today = getTodayString();
    dayPicker.min = today;
    deadlineDay.min = today;

    // set max deadline
    dayPicker.addEventListener("input", () => {
      deadlineDay.max = dayPicker.value;
      deadlineDay.value = subtractDays(dayPicker.value, 2);
      if (new Date(deadlineDay.value) < new Date()) {
        deadlineDay.value = "";
      }
    });

    // submitting to google slides
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitButton.disabled = true;

      const formData = {
        title: form.title.value,
        date: form.date.value,
        time: form.time.value,
        deadDate: form.deadDate.value,
        deadTime: form.deadTime.value,
        count: form.count.value,
        location: form.location.value,
        notes: form.notes.value,
        status: form.status.value,
        goingCount: form.goingCount.value,
        action: "newSubmission"
      };

      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (result.success) {
          alert("Event created!");
          form.reset();
        }
      } catch (err) {
        console.error(err);
        alert("Unable to create event.");
      } finally {
        submitButton.disabled = false;
      }
    });

  </script>
  <div id="header">
    <h1 id="myHeader">Meeting maker</h1>
    <hr>
  </div>
  <div id="main" class="main">
    <form id="contactForm">
      <div id="eventName" class="formsection">
        <label for="formField0" class="label">Title:</label><br>
        <input id="title" class="formfield" name="title" required><br>
      </div>
      <div id="eventLocation" class="formsection">
        <label for="formField1" class="label">Location:</label><br>
        <input id="location" class="formfield" name="location" required><br>
      </div>
      <div id="eventTime" class="formsection">
        <label for="formField2" class="label">Date label:</label><br>
        <div id="formField2" class="formfield">
          <input id="dayPicker" class="datePicker" type="date" name="date" required>
          <input id="timePicker" class="datePicker" type="time" name="time" value="12:00" required><br>
        </div>
      </div>
      <div id="eventJoinDeadline" class="formsection">
        <label for="formField3" class="label">deadline:</label><br>
        <div id="formField3" class="formfield">
          <input id="deadlineDay" class="deadline" type="date" name="deadDate" required>
          <input id="deadlineTime" class="deadline" type="time" name="deadTime" value="23:59" required><br>
        </div>
      </div>
      <div id="eventAttendance" class="formsection">
        <label for="formField4" class="label">Attendance:</label><br>

        <input id="attendance" class="formfield" type="number" min="3" placeholder="eg: 5" name="count" required><br>

      </div>
      <div id="eventNotes" class="formsection">
        <label for="formField5" class="label">Notes (optional):</label><br>

        <textarea class="formfield" name="notes"></textarea><br>

      </div>
      <input id="submitButton" class="formfield button" type="submit" value="Create event!"><br>
      <input type="hidden" name="status" value="pending">
      <!--       <input type="hidden" name="goingCount" value="0"> -->
    </form>

  </div>
  <hr>
  <h3>Printer</h3>
  <p id="printer"></p>

</body>

</html>
